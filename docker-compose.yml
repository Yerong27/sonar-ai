services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: sonar
    ports:
      - "5432:5432"
    volumes:
      - sonar-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8060:8060"
    environment:
      DATABASE_URL: postgresql+psycopg://sonar:${POSTGRES_PASSWORD:-change-me}@postgres:5432/sonar
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python -m sonar.worker
    environment:
      DATABASE_URL: postgresql+psycopg://sonar:${POSTGRES_PASSWORD:-change-me}@postgres:5432/sonar
    depends_on:
      postgres:
        condition: service_healthy

  dash:
    build:
      context: .
      dockerfile: Dockerfile.dash
    ports:
      - "8050:8050"
    volumes:
      - sonar-data:/app/sonar/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:3000"
    depends_on:
      - api

volumes:
  sonar-data:
  sonar-postgres:
