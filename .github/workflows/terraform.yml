name: Terraform application infrastructure

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Create a plan or apply the exact saved plan
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
      confirmation:
        description: Type apply when operation is apply
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: production-terraform
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: sonar-ai-prod
  WIF_PROVIDER: projects/476810083673/locations/global/workloadIdentityPools/github-actions/providers/github
  TERRAFORM_DEPLOYER_SERVICE_ACCOUNT: sonar-terraform-deployer@sonar-ai-prod.iam.gserviceaccount.com
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VAR_deploy_workloads: "true"
  TF_VAR_initial_image: australia-southeast1-docker.pkg.dev/sonar-ai-prod/sonar/sonar-api@sha256:826d1df2ea275445d04e7238985032b08c557da3208180f15353db038c083cee
  TF_VAR_scheduler_paused: "false"
  TF_VAR_manage_budget: "false"

jobs:
  terraform:
    name: ${{ inputs.operation }} application infrastructure
    runs-on: ubuntu-latest
    environment: infrastructure
    defaults:
      run:
        working-directory: terraform/application
    steps:
      - name: Require an explicit apply confirmation
        if: inputs.operation == 'apply'
        run: |
          if [[ "${{ inputs.confirmation }}" != "apply" ]]; then
            echo "Apply was selected, but confirmation was not exactly: apply" >&2
            exit 1
          fi

      - name: Check out source
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud through WIF
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.TERRAFORM_DEPLOYER_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"
          terraform_wrapper: false

      - name: Check formatting
        run: terraform fmt -check

      - name: Initialize remote state
        run: |
          terraform init \
            -backend-config='bucket=sonar-ai-prod-terraform-state' \
            -backend-config='prefix=application'

      - name: Validate configuration
        run: terraform validate

      - name: Create the reviewable plan
        run: terraform plan -out=tfplan

      - name: Apply the exact reviewed plan
        if: inputs.operation == 'apply'
        run: terraform apply tfplan
