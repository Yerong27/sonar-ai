name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python lint, migrations, and tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sonar
          POSTGRES_PASSWORD: sonar-ci-password
          POSTGRES_DB: sonar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sonar -d sonar_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg://sonar:sonar-ci-password@127.0.0.1:5432/sonar_test
      TEST_DATABASE_URL: postgresql+psycopg://sonar:sonar-ci-password@127.0.0.1:5432/sonar_test
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint Python
        run: python -m ruff check sonar tests alembic

      - name: Apply migrations to a clean PostgreSQL database
        run: alembic upgrade head

      - name: Verify the current Alembic head
        run: |
          test "$(alembic current | tail -n 1)" = "$(alembic heads | tail -n 1)"

      - name: Run PostgreSQL test suite
        run: python -m pytest -q

  frontend:
    name: Frontend production build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.21.1"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  container:
    name: Production container build
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Build shared API, migration, and collector image
        run: docker build --file Dockerfile.api --tag sonar-api:ci .

  terraform:
    name: Terraform format and validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.15.8"

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform

      - name: Initialize and validate bootstrap root
        run: |
          terraform -chdir=terraform/bootstrap init -backend=false -input=false
          terraform -chdir=terraform/bootstrap validate

      - name: Initialize and validate application root
        run: |
          terraform -chdir=terraform/application init -backend=false -input=false
          terraform -chdir=terraform/application validate
